name: neural-brain

x-postgres-base: &postgres-base
  image: docker.io/library/postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
  restart: "no"
  init: true
  shm_size: 128mb
  stop_grace_period: 30s
  security_opt:
    - no-new-privileges:true

services:
  postgres-dev:
    <<: *postgres-base
    environment:
      POSTGRES_DB: ${NEURAL_BRAIN_DEV_DB:?local environment not initialized}
      POSTGRES_USER: ${NEURAL_BRAIN_DEV_USER:?local environment not initialized}
      POSTGRES_PASSWORD: ${NEURAL_BRAIN_DEV_PASSWORD:?local environment not initialized}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - 127.0.0.1:${NEURAL_BRAIN_DEV_PORT:?local environment not initialized}:5432
    volumes:
      - postgres_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s

  postgres-test:
    <<: *postgres-base
    environment:
      POSTGRES_DB: ${NEURAL_BRAIN_TEST_DB:?local environment not initialized}
      POSTGRES_USER: ${NEURAL_BRAIN_TEST_USER:?local environment not initialized}
      POSTGRES_PASSWORD: ${NEURAL_BRAIN_TEST_PASSWORD:?local environment not initialized}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - 127.0.0.1:${NEURAL_BRAIN_TEST_PORT:?local environment not initialized}:5432
    volumes:
      - postgres_test_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  postgres_dev_data:
    name: neural-brain-postgres-dev-data
  postgres_test_data:
    name: neural-brain-postgres-test-data
