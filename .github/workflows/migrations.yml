name: Migration validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: migrations-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-migrations:
    name: PostgreSQL 18 forward migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: docker.io/library/postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: migration-validation-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    env:
      MIGRATION_ADMIN_DSN: postgresql://postgres:migration-validation-only@127.0.0.1:5432/postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install pinned uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install pinned CPython and locked dependencies
        run: |
          uv python install
          uv sync --locked --all-groups

      - name: Bootstrap fixed database roles
        run: >-
          uv run --locked --all-groups python tools/bootstrap_database_roles.py
          --admin-dsn "$MIGRATION_ADMIN_DSN"

      - name: Validate repository migration plan
        run: >-
          uv run --locked --all-groups python tools/validate_migrations.py
          --admin-dsn "$MIGRATION_ADMIN_DSN"
          --migrations-dir migrations

      - name: Prove forward migration from previous schema
        run: >-
          uv run --locked --all-groups python tools/validate_migrations.py
          --admin-dsn "$MIGRATION_ADMIN_DSN"
          --migrations-dir tests/migrations/fixtures/forward

      - name: Run migration contract tests
        run: uv run --locked --all-groups pytest tests/migrations

      - name: Run live scoped-memory database tests
        run: uv run --locked --all-groups pytest tests/database
